<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@curso.list.headline">Cursoes</h1>
    <div>
        <a routerLink="/cursos/add" class="btn btn-primary ms-2" i18n="@@curso.list.createNew">Create new Curso</a>
    </div>
</div>
@if (!cursoes || cursoes.length === 0) {
<div i18n="@@curso.list.empty">No Cursoes could be found.</div>
} @else {
<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th scope="col" i18n="@@curso.id.label">Id</th>
                <th scope="col" i18n="@@curso.nombre.label">Nombre</th>
                <th scope="col" i18n="@@curso.idProfesor.label">Id Profesor</th>
                <th><!-- --></th>
            </tr>
        </thead>
        <tbody>
            @for (curso of cursoes; track curso.id) {
            <tr>
                <td>{{ curso.id }}</td>
                <td>{{ curso.nombre }}</td>
                <td>{{ curso.idProfesor }}</td>
                <td>
                    <div class="float-end text-nowrap">
                        <a [routerLink]="['/cursos/edit', curso.id]" class="btn btn-sm btn-secondary" i18n="@@curso.list.edit">Edit</a>
                        <button type="button" (click)="confirmDelete(curso.id!)" class="btn btn-sm btn-secondary" i18n="@@curso.list.delete">Delete</button>
                    </div>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
}
