<input
  placeholder="introduce el nombre del responsable"
  class="form-control mb-3"
  [(ngModel)]="responsable"
/>
<button class="btn btn-primary mb-3" (click)="buscar()">Buscar</button>

@if (procesado) {
  <div class="alert alert-primary">El numero de resultados obtenidos es de {{ tareas.length }}</div>
}

<div class="row row-cols-1 row-cols-md-3 g-4">
  @for (data of tareas; track $index) {
    <app-card-item [item]="data"></app-card-item>
  }
</div>
