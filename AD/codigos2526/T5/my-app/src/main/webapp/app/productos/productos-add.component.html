<div class="d-flex flex-wrap mb-4">
    <h1 class="flex-grow-1" i18n="@@productos.add.headline">Add Productos</h1>
    <div>
        <a routerLink="/productoss" class="btn btn-secondary" i18n="@@productos.add.back">Back to list</a>
    </div>
</div>
<form [formGroup]="addForm" (ngSubmit)="handleSubmit()">
    <app-input-row [group]="addForm" field="nombre" i18n-label="@@productos.nombre.label" label="Nombre" />
    <app-input-row [group]="addForm" field="precio" rowType="number" i18n-label="@@productos.precio.label" label="Precio" />
    <input type="submit" i18n-value="@@productos.add.headline" value="Add Productos" class="btn btn-primary mt-4" />
</form>
