    <nav class="navbar navbar-expand-lg bg-body-tertiary">

    <div class="container mt-4">
      <h1 class="text-center">Pagina maquetada con bootstrap</h1>
      <div class="row g-3">
        <!-- la suma de todas las columnas tiene que ser 12 -->
        <div class="col bg-primary-subtle text-primary-emphasis p-4">
          <h2 class="text-center">Formulario de introduccion de datos</h2>
          <input
            type="text"
            placeholder="Introduce tu nombre"
            class="form-control mb-3 mt-4"
          />

          <input
            type="text"
            placeholder="Introduce tu apellido"
            class="form-control mb-3"
          />

          <input
            type="number"
            placeholder="Introduce tu edad"
            class="form-control mb-3"
          />

          <select class="form-select mb-3">
            <option>Administrador</option>
            <option>Inivitado</option>
            <option>Usuario</option>
          </select>

          <button type="button" class="btn btn-danger w-100">
            Enviar datos
          </button>

          <!-- formulario de introduccion de datos -->
        </div>
        <div class="col bg-success text-white p-4">
          <h2 class="text-center">Mostrar datos resultantes</h2>
          <ul class="list-group mt-4">
            <li class="list-group-item">An item</li>
            <li class="list-group-item">A second item</li>
            <li class="list-group-item">A third item</li>
            <li class="list-group-item">A fourth item</li>
            <li class="list-group-item">And a fifth one</li>
          </ul>
