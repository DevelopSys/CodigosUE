<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Document</title>
  </head>
  <body>
    <main class="container mt-4">
      <h1 class="text-center">PAGINA JS</h1>
      <p>Esta pagina es para explicar JS a los alumnos de ASIR</p>
      <input
        class="form-control"
        placeholder="Introduce tu nombre"
        id="input-nombre"
      />
      <button class="btn btn-primary" id="boton-saludar">Saludar</button>
      <button class="btn btn-primary" id="boton-despedir">Despedir</button>
      <p id="parrafo-nombre"></p>

      <div>
        <input placeholder="Introduce nombre" class="form-control mb-3" />
        <input placeholder="Introduce apellido" class="form-control mb-3" />
        <input
          placeholder="Introduce edad"
          type="number"
          class="form-control mb-3"
        />
        <input
          placeholder="Introduce fecha nacimiento"
          type="date"
          class="form-control mb-3"
        />
        <select class="form-select mb-3">
          <option>DAM</option>
          <option>DAW</option>
          <option>ASIR</option>
        </select>
        <button class="btn btn-primary w-100">Enviar datos</button>
        <!-- Sacar por consola cuando se pulsa el boton enviar los datos del nombre, apellido, edad, curso, fecha de nacimiento -->
      </div>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
